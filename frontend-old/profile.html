<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Profil | Meowly</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="dashboard-page">
        <aside class="side-menu">
            <h2>Meowly</h2>

            <a href="dashboard.html">Dashboard</a>
            <a href="index.html">Mapa</a>
            <a href="#">Misje</a>
            <a href="#">Zgłoszenia</a>
            <a href="#">Adopcje</a>
            <a href="#">Fundacje</a>
            <a href="#">Ranking</a>
            <a href="profile.html" class="active">Profil</a>
        </aside>

        <section class="dashboard-content">
            <div class="dashboard-header">
                <div>
                    <p class="small-label">Twój profil</p>
                    <h1 id="profileName">Profil</h1>
                </div>

                <a href="dashboard.html" class="login-button">Dashboard</a>
            </div>

            <div class="xp-card">
                <h2>Poziom 1 — Odkrywca Kotów</h2>
                <p id="profileXp">0 XP</p>

                <div class="xp-bar">
                    <div class="xp-fill"></div>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <h3>Email</h3>
                    <p id="profileEmail">-</p>
                </div>

                <div class="dashboard-card">
                    <h3>Rola</h3>
                    <p id="profileRole">-</p>
                </div>

                <div class="dashboard-card">
                    <h3>Odznaki</h3>
                    <p class="stat-number">0</p>
                    <span>zdobyte</span>
                </div>
            </div>
        </section>
    </main>

    <script src="js/profile.js"></script>
</body>
</html>
